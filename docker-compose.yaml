services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    networks:
      - openmind-local

  dynamodb-setup:
    image: amazon/aws-cli
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-2
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        until aws --endpoint-url=http://dynamodb-local:8000 dynamodb list-tables; do
          echo 'Waiting for DynamoDB Local...'
          sleep 2
        done
        echo 'Creating DynamoDB table...'
        aws --endpoint-url=http://dynamodb-local:8000 dynamodb create-table \
          --table-name Orders-local \
          --attribute-definitions AttributeName=id,AttributeType=S AttributeName=customerId,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{"IndexName":"CustomerIdIndex","KeySchema":[{"AttributeName":"customerId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]'
        echo 'Setup complete.'
    networks:
      - openmind-local

networks:
  openmind-local:
    name: openmind-local
